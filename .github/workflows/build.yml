name: Build Executables

on:
  push:
    branches: [main, master, "claude/**"]
    tags:     ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    name: Build Windows .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame numpy pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller blockheads_pc.spec --clean --noconfirm
        env:
          PYTHONIOENCODING: utf-8

      - name: Verify build output
        shell: pwsh
        run: |
          if (-Not (Test-Path "dist\BlockheadsPC\BlockheadsPC.exe")) {
            Write-Error "BlockheadsPC.exe not found – build failed"
            exit 1
          }
          Write-Host "Build OK – files:"
          Get-ChildItem dist\BlockheadsPC\ | Select-Object Name, Length

      - name: Write README into bundle
        shell: pwsh
        run: |
          @"
The Blockheads – PC Edition
============================

LANCEMENT
---------
Double-cliquez sur BlockheadsPC.exe

Au premier lancement le jeu telecharge automatiquement
les ressources graphiques et sonores (~96 Mo).
Une connexion Internet est necessaire pour cette etape.

CONTROLES
---------
Fleches / A D    Se deplacer
Espace / W       Sauter
Clic gauche      Miner (maintenir)
Clic droit       Poser un bloc
1-9 / Molette    Changer de bloc
E                Inventaire creatif
Echap            Pause
F11              Plein ecran

NE PAS SUPPRIMER
----------------
Le dossier apk_extracted/ (cree au 1er lancement) contient
les ressources du jeu. Le supprimer force un nouveau telechargement.
"@ | Out-File -FilePath "dist\BlockheadsPC\LISEZ-MOI.txt" -Encoding utf8

      - name: Zip bundle
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\BlockheadsPC\*" `
                           -DestinationPath "dist\BlockheadsPC-Windows.zip" -Force
          $size = (Get-Item "dist\BlockheadsPC-Windows.zip").Length / 1MB
          Write-Host ("ZIP created: {0:N1} MB" -f $size)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockheadsPC-Windows
          path: dist/BlockheadsPC-Windows.zip
          retention-days: 30

  # Create a GitHub Release when a v* tag is pushed
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Blockheads PC Edition ${{ github.ref_name }}"
          body: |
            ## The Blockheads – PC Edition ${{ github.ref_name }}

            ### Installation
            1. Téléchargez **BlockheadsPC-Windows.zip**
            2. Extrayez le dossier
            3. Double-cliquez sur **BlockheadsPC.exe**
            4. Les ressources (~96 Mo) se téléchargent automatiquement au 1er lancement

            ### Contrôles
            `←→` déplacement · `Espace` saut · `Clic gauche` miner · `Clic droit` poser · `E` inventaire
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
