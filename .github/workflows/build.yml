name: Build Executables

on:
  push:
    branches: [main, master, "claude/**"]
    tags:     ["v*"]
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest
    name: Build Windows .exe

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Python packages ──────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame numpy pyinstaller

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller blockheads_pc.spec --clean --noconfirm

      # ── Verify the binary was created ────────────────────────────────────
      - name: Verify build output
        shell: pwsh
        run: |
          Get-ChildItem dist\BlockheadsPC\
          echo "Build OK"

      # ── Add README inside the bundle ─────────────────────────────────────
      - name: Write README into bundle
        shell: pwsh
        run: |
          $content = @"
          ╔══════════════════════════════════════════════════════╗
          ║         The Blockheads – PC Edition                  ║
          ╚══════════════════════════════════════════════════════╝

          LANCEMENT
          ---------
          Double-cliquez sur BlockheadsPC.exe

          Au premier lancement le jeu télécharge automatiquement
          les ressources graphiques et sonores (~96 Mo).
          Une connexion Internet est nécessaire pour cette étape.

          CONTRÔLES
          ---------
          Flèches / A D    Se déplacer
          Espace / W       Sauter
          Clic gauche      Miner (maintenir)
          Clic droit       Poser un bloc
          1-9 / Molette    Changer de bloc
          E                Inventaire créatif
          Echap            Pause
          F11              Plein écran

          NE PAS SUPPRIMER
          ----------------
          Le dossier apk_extracted/ (créé au 1er lancement) contient
          les ressources du jeu. Le supprimer force un nouveau
          téléchargement.
          "@
          $content | Out-File -FilePath "dist\BlockheadsPC\LISEZ-MOI.txt" -Encoding utf8

      # ── Zip the bundle ───────────────────────────────────────────────────
      - name: Zip bundle
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\BlockheadsPC\*" `
                           -DestinationPath "dist\BlockheadsPC-Windows.zip"
          Get-Item "dist\BlockheadsPC-Windows.zip" | Select-Object Length, Name

      # ── Upload artifact ──────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockheadsPC-Windows
          path: dist/BlockheadsPC-Windows.zip
          retention-days: 30

  # ── Create GitHub Release when a tag v* is pushed ─────────────────────────
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Blockheads PC Edition ${{ github.ref_name }}"
          body: |
            ## The Blockheads – PC Edition ${{ github.ref_name }}

            Recréation PC du jeu Android/iOS original, avec les vraies textures et sons.

            ### Installation
            1. Téléchargez **BlockheadsPC-Windows.zip**
            2. Extrayez le dossier
            3. Double-cliquez sur **BlockheadsPC.exe**
            4. La première exécution télécharge les ressources (~96 Mo) automatiquement

            ### Contrôles
            `←→` déplacement · `Espace` saut · `Clic gauche` miner · `Clic droit` poser · `E` inventaire
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
